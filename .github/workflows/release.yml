name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. 0.1.0)'
        required: true

permissions:
  contents: write   # create tags, releases, upload assets
  packages: write   # pull from nuget.pkg.github.com/katasec + push to ghcr.io

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── 1. Tag the commit and open a draft release ──────────────────────────────
  prepare:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Create tag and draft release
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag v${{ github.event.inputs.version }}
          git push origin v${{ github.event.inputs.version }}
          gh release create v${{ github.event.inputs.version }} \
            --draft \
            --title "v${{ github.event.inputs.version }}" \
            --generate-notes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── 2. Build a native AOT binary on each target OS and attach it ─────────────
  build:
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14        # Apple Silicon runner — required for osx-arm64 AOT
            rid: osx-arm64
            binary: forge
            asset: forge-osx-arm64

          - os: ubuntu-latest
            rid: linux-x64
            binary: forge
            asset: forge-linux-x64

          - os: windows-11-arm
            rid: win-arm64
            binary: forge.exe
            asset: forge-win-arm64.exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.x'

      # macOS: AOT linker needs Homebrew's openssl and brotli (not on default path)
      - name: Install AOT prerequisites (macOS)
        if: runner.os == 'macOS'
        run: brew install openssl@3 brotli

      # Linux: AOT linker needs clang and zlib headers
      - name: Install AOT prerequisites (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y clang zlib1g-dev

      # Windows: MSVC is pre-installed on windows-latest — nothing extra needed

      - name: Publish native AOT
        run: dotnet publish src/ForgeMission.Cli -c Release -r ${{ matrix.rid }} -o dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NUGET_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Ad-hoc sign the macOS binary so Gatekeeper doesn't immediately block it.
      # This is not a trusted Apple Developer ID signature — it won't pass
      # notarization — but it removes the "unidentified developer" hard block
      # that an unsigned binary triggers on download.
      - name: Ad-hoc sign (macOS only)
        if: runner.os == 'macOS'
        run: codesign --force --sign - dist/${{ matrix.binary }}

      - name: Upload release asset
        shell: bash
        run: |
          cp dist/${{ matrix.binary }} dist/${{ matrix.asset }}
          gh release upload v${{ github.event.inputs.version }} dist/${{ matrix.asset }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── 3. Build and push forge Docker image to ghcr.io ──────────────────────────
  docker:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Download linux binary from release
        run: |
          gh release download v${{ github.event.inputs.version }} \
            --pattern forge-linux-x64 \
            --dir .
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/katasec/forge:latest
            ghcr.io/katasec/forge:${{ github.event.inputs.version }}

  # ── 4. All binaries + image ready — draft release is open for review ─────────
  #
  # The release stays as a draft. Go to GitHub → Releases → Edit → Publish
  # once you've reviewed the attached binaries and release notes.
